version: 2

models:
  - name: silver__customers
    description: "Cleaned customers — deduplicated, null-fixed, zombies removed"
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: customer_external_id
        description: "Renamed from cust_ext_id — schema evolution handled"
        tests:
          - not_null
          - unique
      - name: region
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['US', 'EU', 'LATAM']
      - name: segment
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['whale', 'regular', 'bargain_hunter', 'low_frequency']
      - name: account_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['active', 'suspended', 'closed']
      - name: signup_date
        tests:
          - not_null

  - name: silver__orders
    description: "Cleaned orders — type-fixed, null-standardized, deduplicated"
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['placed', 'paid', 'shipped', 'in_transit', 'delivered', 'cancelled', 'refunded']
      - name: order_channel
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['web', 'mobile_app', 'marketplace_api']
      - name: subtotal
        description: "Type drift fixed — cast from string back to numeric. ~0.2% unparseable values remain as NULL."
        tests:
          - not_null:
              config:
                severity: warn
      - name: total_amount
        description: "Type drift fixed — cast from string back to numeric. ~0.2% unparseable values remain as NULL."
        tests:
          - not_null:
              config:
                severity: warn
      - name: order_placed_at
        tests:
          - not_null

  - name: silver__order_items
    description: "Cleaned order items — orphans removed, types fixed, negatives handled"
    columns:
      - name: order_item_id
        tests:
          - not_null
          - unique
      - name: order_id
        description: "Orphan records filtered — all order_ids should be valid"
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: unit_price
        description: "Type drift fixed — cast from string back to numeric. ~0.2% unparseable values remain as NULL."
        tests:
          - not_null:
              config:
                severity: warn
      - name: line_total
        description: "Type drift fixed — cast from string back to numeric. ~0.2% unparseable values remain as NULL."
        tests:
          - not_null:
              config:
                severity: warn

  - name: silver__payments
    description: "Cleaned payments — orphans removed, nulls fixed, deduplicated"
    columns:
      - name: payment_id
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - not_null
      - name: payment_method
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['credit_card', 'debit_card', 'paypal', 'apple_pay', 'google_pay', 'bank_transfer']
      - name: payment_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['pending', 'authorized', 'captured', 'failed', 'refunded', 'chargeback']
      - name: amount
        tests:
          - not_null

  - name: silver__shipments
    description: "Cleaned shipments — nulls fixed, deduplicated"
    columns:
      - name: shipment_id
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - not_null
      - name: shipping_method
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['standard', 'express', 'next_day', 'same_day']

  - name: silver__sellers
    description: "Sellers — clean passthrough"
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique

  - name: silver__products
    description: "Products — clean passthrough"
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: silver__returns
    description: "Returns — clean passthrough"
    columns:
      - name: return_id
        tests:
          - not_null
          - unique

  - name: silver__reviews
    description: "Reviews — orphan products filtered"
    columns:
      - name: review_id
        tests:
          - not_null
          - unique
      - name: rating
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]